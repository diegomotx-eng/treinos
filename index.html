<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Treinos"/>
  <title>Treinos — Diego</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a227;
      --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
      --text: #fff; --text2: #aaa; --text3: #555;
      --green: #4caf50; --border: rgba(255,255,255,0.08);
    }
    html, body { font-family: -apple-system,'Inter',sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* HEADER */
    .header { position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 20px 12px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .logo { font-size: 1rem; font-weight: 800; }
    .logo span { color: var(--gold); }
    .hoje-badge { font-size: .7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); background: rgba(201,162,39,.1); border: 1px solid rgba(201,162,39,.25); padding: 4px 12px; border-radius: 99px; }

    /* TABS */
    .tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 7px 16px; border-radius: 99px; font-size: .82rem; font-weight: 600; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
    .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .tab.hoje-tab { border-color: rgba(201,162,39,.4); color: var(--gold); }

    /* CONTENT */
    .content { padding: 20px 16px 60px; }
    .treino-header { margin-bottom: 16px; }
    .treino-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; }
    .treino-title span { color: var(--gold); }
    .treino-sub { font-size: .85rem; color: var(--text2); }

    /* PROGRESSO */
    .prog-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .prog-label { font-size: .78rem; color: var(--text2); white-space: nowrap; }
    .prog-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--gold); border-radius: 99px; transition: width .3s; }
    .prog-num { font-size: .78rem; font-weight: 700; color: var(--gold); white-space: nowrap; }

    /* GRUPO */
    .grupo { margin-bottom: 20px; }
    .grupo-label { font-size: .68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; padding-left: 2px; }

    /* CARD */
    .ex-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; overflow: hidden; transition: border-color .2s; }
    .ex-card.feito { border-color: rgba(76,175,80,.35); background: rgba(76,175,80,.04); }

    /* LINHA PRINCIPAL */
    .ex-row { display: flex; align-items: stretch; cursor: pointer; }

    /* MINIATURA */
    .ex-thumb { width: 86px; min-height: 86px; flex-shrink: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .ex-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ex-thumb .emoji-fb { font-size: 2rem; }
    .shimmer { position: absolute; inset: 0; background: linear-gradient(90deg,var(--bg3) 25%,#1f1f1f 50%,var(--bg3) 75%); background-size: 200% 100%; animation: sh 1.2s infinite; }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* INFO */
    .ex-info { flex: 1; padding: 14px 12px; display: flex; flex-direction: column; justify-content: center; }
    .ex-nome { font-size: .93rem; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .ex-card.feito .ex-nome { text-decoration: line-through; opacity: .4; }
    .ex-detalhe { font-size: .76rem; color: var(--text2); }
    .ex-card.feito .ex-detalhe { opacity: .4; }

    /* CHECK */
    .ex-check { width: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; color: var(--text3); border-left: 1px solid var(--border); }
    .ex-card.feito .ex-check { color: var(--green); }

    /* BOTÃO VER */
    .ex-ver-btn { width: 100%; padding: 9px 14px; border-top: 1px solid var(--border); background: transparent; color: var(--text2); font-size: .78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: none; border-right: none; border-bottom: none; transition: background .15s, color .15s; text-align: left; }
    .ex-ver-btn:hover { background: rgba(255,255,255,.03); color: var(--text); }
    .ex-ver-btn .icone { font-size: 1rem; }
    .ex-ver-btn .arrow { margin-left: auto; font-size: .7rem; transition: transform .2s; }
    .ex-ver-btn.aberto .arrow { transform: rotate(180deg); }
    .ex-ver-btn.aberto { color: var(--gold); }

    /* GIF EXPANDIDO */
    .ex-gif-wrap { display: none; border-top: 1px solid var(--border); background: #000; text-align: center; }
    .ex-gif-wrap.aberto { display: block; }
    .ex-gif-wrap img { width: 100%; max-height: 300px; object-fit: contain; display: block; }
    .ex-gif-wrap .gif-loading { padding: 40px; color: var(--text2); font-size: .85rem; }
    .ex-gif-wrap .gif-erro { padding: 32px 20px; color: var(--text2); font-size: .85rem; text-align: center; line-height: 1.6; }

    /* MODAL */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.aberto { display: flex; }
    .modal-inner { position: relative; max-width: 400px; width: 100%; }
    .modal-inner img { width: 100%; border-radius: 12px; display: block; }
    .modal-fechar { position: absolute; top: -14px; right: -14px; width: 32px; height: 32px; background: var(--bg2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .9rem; cursor: pointer; color: var(--text2); }

    /* DESCANSO */
    .descanso-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 40px 20px; text-align: center; }
    .descanso-emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .descanso-titulo { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .descanso-sub { font-size: .88rem; color: var(--text2); line-height: 1.6; }

    /* RESET */
    .reset-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: .82rem; font-weight: 600; cursor: pointer; margin-top: 4px; transition: all .15s; }
    .reset-btn:hover { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">D<span>.</span>M Treinos</div>
    <div class="hoje-badge" id="hoje-badge">Hoje: —</div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<!-- MODAL GIF AMPLIADO -->
<div class="modal-bg" id="modal" onclick="fecharModal()">
  <div class="modal-inner" onclick="event.stopPropagation()">
    <div class="modal-fechar" onclick="fecharModal()">✕</div>
    <img id="modal-img" src="" alt=""/>
  </div>
</div>

<script>
const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];

const TREINOS = {
  'Segunda': {
    titulo: 'Peito', sub: 'Tríceps como auxiliar',
    grupos: [
      { nome: 'Peito', exercicios: [
        { nome: 'Supino Reto com Barra',       detalhe: '4 séries × 8–12 reps',  api: 'barbell bench press',      emoji: '🏋️' },
        { nome: 'Supino Inclinado Halteres',    detalhe: '3 séries × 10–12 reps', api: 'incline dumbbell press',   emoji: '💪' },
        { nome: 'Crucifixo com Halteres',       detalhe: '3 séries × 12–15 reps', api: 'dumbbell fly',             emoji: '🦅' },
        { nome: 'Crossover no Cabo',            detalhe: '3 séries × 12–15 reps', api: 'cable crossover',          emoji: '🔀' },
      ]},
      { nome: 'Tríceps', exercicios: [
        { nome: 'Tríceps Pulley (corda)',        detalhe: '4 séries × 10–12 reps', api: 'triceps pushdown',         emoji: '⬇️' },
        { nome: 'Tríceps Francês',              detalhe: '3 séries × 10–12 reps', api: 'skull crusher',            emoji: '💀' },
      ]},
    ]
  },
  'Terça': {
    titulo: 'Costas', sub: 'Bíceps como auxiliar',
    grupos: [
      { nome: 'Costas', exercicios: [
        { nome: 'Puxada na Frente',             detalhe: '4 séries × 8–12 reps',  api: 'lat pulldown',             emoji: '🔽' },
        { nome: 'Remada Curvada com Barra',      detalhe: '4 séries × 8–12 reps',  api: 'barbell bent over row',    emoji: '🏋️' },
        { nome: 'Remada Unilateral',             detalhe: '3 séries × 10–12 reps', api: 'one arm dumbbell row',     emoji: '💪' },
        { nome: 'Pullover com Halter',           detalhe: '3 séries × 12 reps',    api: 'dumbbell pullover',        emoji: '🌊' },
      ]},
      { nome: 'Bíceps', exercicios: [
        { nome: 'Rosca Direta com Barra',        detalhe: '4 séries × 10–12 reps', api: 'barbell curl',             emoji: '💪' },
        { nome: 'Rosca Martelo',                detalhe: '3 séries × 10–12 reps', api: 'hammer curl',              emoji: '🔨' },
      ]},
    ]
  },
  'Quarta': {
    titulo: 'Pernas', sub: 'Quadríceps, posterior e panturrilha',
    grupos: [
      { nome: 'Quadríceps', exercicios: [
        { nome: 'Agachamento Livre',            detalhe: '4 séries × 8–12 reps',  api: 'barbell squat',            emoji: '🦵' },
        { nome: 'Leg Press 45°',                detalhe: '4 séries × 10–12 reps', api: 'leg press',                emoji: '🦵' },
        { nome: 'Cadeira Extensora',            detalhe: '3 séries × 12–15 reps', api: 'leg extension',            emoji: '🦵' },
      ]},
      { nome: 'Posterior + Panturrilha', exercicios: [
        { nome: 'Mesa Flexora',                 detalhe: '3 séries × 12–15 reps', api: 'lying leg curl',           emoji: '🦵' },
        { nome: 'Stiff com Halteres',           detalhe: '3 séries × 10–12 reps', api: 'romanian deadlift',        emoji: '🏋️' },
        { nome: 'Panturrilha em Pé',            detalhe: '4 séries × 15–20 reps', api: 'standing calf raise',      emoji: '🦶' },
      ]},
    ]
  },
  'Quinta': {
    titulo: 'Ombros', sub: 'Trapézio como auxiliar',
    grupos: [
      { nome: 'Ombros', exercicios: [
        { nome: 'Desenvolvimento Halteres',     detalhe: '4 séries × 10–12 reps', api: 'dumbbell shoulder press',  emoji: '🔝' },
        { nome: 'Elevação Lateral',             detalhe: '4 séries × 12–15 reps', api: 'lateral raise',            emoji: '↔️' },
        { nome: 'Elevação Frontal',             detalhe: '3 séries × 12 reps',    api: 'front raise',              emoji: '⬆️' },
        { nome: 'Voador Invertido',             detalhe: '3 séries × 12–15 reps', api: 'reverse fly',              emoji: '🦅' },
      ]},
      { nome: 'Trapézio', exercicios: [
        { nome: 'Encolhimento com Halteres',    detalhe: '3 séries × 12–15 reps', api: 'dumbbell shrug',           emoji: '🤷' },
        { nome: 'Remada Alta',                  detalhe: '3 séries × 12 reps',    api: 'upright row',              emoji: '⬆️' },
      ]},
    ]
  },
  'Sexta': {
    titulo: 'Braços + Abdômen', sub: 'Bíceps, tríceps e core',
    grupos: [
      { nome: 'Bíceps', exercicios: [
        { nome: 'Rosca Scott',                  detalhe: '4 séries × 10–12 reps', api: 'preacher curl',            emoji: '💪' },
        { nome: 'Rosca Concentrada',            detalhe: '3 séries × 12 reps',    api: 'concentration curl',       emoji: '💪' },
      ]},
      { nome: 'Tríceps', exercicios: [
        { nome: 'Tríceps Testa',                detalhe: '4 séries × 10–12 reps', api: 'skull crusher',            emoji: '💀' },
        { nome: 'Mergulho entre Bancos',        detalhe: '3 séries × 12–15 reps', api: 'tricep dip',               emoji: '⬇️' },
      ]},
      { nome: 'Abdômen', exercicios: [
        { nome: 'Abdominal Crunch',             detalhe: '3 séries × 20 reps',    api: 'crunch',                   emoji: '⚡' },
        { nome: 'Prancha',                      detalhe: '3 séries × 30–45s',     api: 'plank',                    emoji: '🧱' },
        { nome: 'Elevação de Pernas',           detalhe: '3 séries × 15 reps',    api: 'leg raise',                emoji: '🦵' },
      ]},
    ]
  },
  'Sábado': null,
  'Domingo': null,
};

// Cache
const gifCache = JSON.parse(localStorage.getItem('gifCache') || '{}');

async function getGif(apiName) {
  if (gifCache[apiName] !== undefined) return gifCache[apiName];
  try {
    const res = await fetch(`https://exercisedb.io/api/v1/exercises/name/${encodeURIComponent(apiName)}?limit=1`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const gif = data?.[0]?.gifUrl || null;
    gifCache[apiName] = gif;
    localStorage.setItem('gifCache', JSON.stringify(gifCache));
    return gif;
  } catch {
    gifCache[apiName] = null;
    localStorage.setItem('gifCache', JSON.stringify(gifCache));
    return null;
  }
}

function abrirModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').classList.add('aberto');
}
function fecharModal() {
  document.getElementById('modal').classList.remove('aberto');
}

// Dia
const MAP = [6,0,1,2,3,4,5];
const hojeNome = DIAS[MAP[new Date().getDay()]];
document.getElementById('hoje-badge').textContent = 'Hoje: ' + hojeNome;
let diaAtivo = hojeNome;

// Tabs
const tabsEl = document.getElementById('tabs');
DIAS.forEach(dia => {
  const btn = document.createElement('button');
  btn.className = 'tab'+(dia===hojeNome?' hoje-tab':'')+(dia===diaAtivo?' active':'');
  btn.textContent = dia;
  btn.onclick = () => { diaAtivo=dia; renderTabs(); renderContent(); };
  tabsEl.appendChild(btn);
});
function renderTabs() {
  tabsEl.querySelectorAll('.tab').forEach((b,i) => {
    b.className='tab'+(DIAS[i]===hojeNome?' hoje-tab':'')+(DIAS[i]===diaAtivo?' active':'');
  });
}

function getChecks(dia) { return JSON.parse(localStorage.getItem('checks_'+dia)||'{}'); }

function toggleEx(idx) {
  const c = getChecks(diaAtivo);
  c[idx] = !c[idx];
  localStorage.setItem('checks_'+diaAtivo, JSON.stringify(c));
  const card = document.querySelector(`[data-idx="${idx}"]`);
  if (card) {
    const done = c[idx];
    card.classList.toggle('feito', done);
    card.querySelector('.ex-check').textContent = done ? '✓' : '○';
    const nome = card.querySelector('.ex-nome');
    const det = card.querySelector('.ex-detalhe');
    nome.style.textDecoration = done ? 'line-through' : '';
    nome.style.opacity = done ? '.4' : '';
    det.style.opacity = done ? '.4' : '';
  }
  const treino = TREINOS[diaAtivo];
  const allEx = treino.grupos.flatMap(g => g.exercicios);
  const checks = getChecks(diaAtivo);
  const feitos = allEx.filter((_,i) => checks[i]).length;
  const pct = Math.round((feitos/allEx.length)*100);
  const fill = document.querySelector('.prog-fill');
  const num = document.querySelector('.prog-num');
  if (fill) fill.style.width = pct+'%';
  if (num) num.textContent = feitos+'/'+allEx.length;
}

function toggleGif(idx) {
  const btn = document.querySelector(`[data-gif-btn="${idx}"]`);
  const wrap = document.querySelector(`[data-gif-wrap="${idx}"]`);
  if (!btn || !wrap) return;
  const aberto = wrap.classList.toggle('aberto');
  btn.classList.toggle('aberto', aberto);
  if (aberto && !wrap.dataset.loaded) {
    wrap.dataset.loaded = '1';
    const treino = TREINOS[diaAtivo];
    const ex = treino.grupos.flatMap(g => g.exercicios)[idx];
    const gif = ex && gifCache[ex.api];
    if (gif) {
      wrap.innerHTML = `<img src="${gif}" alt="${ex.nome}" onclick="abrirModal('${gif}')"/>`;
    } else {
      wrap.innerHTML = `<div class="gif-erro">😅 Imagem não disponível para este exercício.<br/>Pesquise "<strong>${ex?.nome || ''}</strong>" no Google para ver como fazer.</div>`;
    }
  }
}

function resetDia() { localStorage.removeItem('checks_'+diaAtivo); renderContent(); }

async function renderContent() {
  const el = document.getElementById('content');
  const treino = TREINOS[diaAtivo];
  if (!treino) {
    el.innerHTML = `<div class="descanso-card"><div class="descanso-emoji">😴</div><div class="descanso-titulo">Dia de descanso</div><div class="descanso-sub">Recuperação é parte do treino.<br/>Descansa e cresce.</div></div>`;
    return;
  }

  await Promise.all(treino.grupos.flatMap(g => g.exercicios).map(ex => getGif(ex.api)));

  const checks = getChecks(diaAtivo);
  const allEx = treino.grupos.flatMap(g => g.exercicios);
  const feitos = allEx.filter((_,i) => checks[i]).length;
  const pct = Math.round((feitos/allEx.length)*100);

  let html = `
    <div class="treino-header">
      <div class="treino-title">${diaAtivo} — <span>${treino.titulo}</span></div>
      <div class="treino-sub">${treino.sub}</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-label">Progresso</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-num">${feitos}/${allEx.length}</div>
    </div>`;

  let idx = 0;
  treino.grupos.forEach(grupo => {
    html += `<div class="grupo"><div class="grupo-label">${grupo.nome}</div>`;
    grupo.exercicios.forEach(ex => {
      const i = idx++;
      const done = !!checks[i];
      const gif = gifCache[ex.api];
      const thumbHtml = gif
        ? `<img src="${gif}" alt="${ex.nome}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/><span class="emoji-fb" style="display:none">${ex.emoji}</span>`
        : `<span class="emoji-fb">${ex.emoji}</span>`;

      html += `
        <div class="ex-card${done?' feito':''}" data-idx="${i}">
          <div class="ex-row" onclick="toggleEx(${i})">
            <div class="ex-thumb">${thumbHtml}</div>
            <div class="ex-info">
              <div class="ex-nome" style="${done?'text-decoration:line-through;opacity:.4':''}">${ex.nome}</div>
              <div class="ex-detalhe" style="${done?'opacity:.4':''}">${ex.detalhe}</div>
            </div>
            <div class="ex-check">${done?'✓':'○'}</div>
          </div>
          <button class="ex-ver-btn" data-gif-btn="${i}" onclick="toggleGif(${i})">
            <span class="icone">📸</span> Ver execução do exercício
            <span class="arrow">▼</span>
          </button>
          <div class="ex-gif-wrap" data-gif-wrap="${i}"></div>
        </div>`;
    });
    html += `</div>`;
  });

  html += `<button class="reset-btn" onclick="resetDia()">↺ Resetar treino de ${diaAtivo}</button>`;
  el.innerHTML = html;
}

renderContent();
</script>
</body>
</html>
